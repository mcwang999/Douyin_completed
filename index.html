<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#10131a" />
    <title>电梯今天不想上班</title>
    <link rel="stylesheet" href="styles/main.css" />
  </head>
  <body>
    <main class="app-shell">
      <canvas id="gameCanvas" aria-label="电梯今天不想上班互动游戏"></canvas>
      <div id="sharePanel" class="share-panel" hidden>
        <img id="shareImage" alt="结局分享卡" />
        <div class="share-actions">
          <button id="downloadShare" type="button">保存分享卡</button>
          <button id="restartGame" type="button">再玩一次</button>
        </div>
      </div>
    </main>
    <script type="module" src="js/main.js"></script>
  </body>
</html>
